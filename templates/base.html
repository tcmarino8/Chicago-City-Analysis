<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ title or "Chicago AQI Sensor Network" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
      body.dark-shell { background: #070b13; color: #e7ebf3; }
      header { background: #111; color: #fff; padding: 1.5rem; }
      header h1 { margin: 0 0 0.5rem 0; font-size: 1.75rem; }
      nav a { color: #ddd; margin-right: 1rem; text-decoration: none; font-weight: 600; }
      nav a:hover { color: #fff; }
      main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem 3rem; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.08); border-radius: 8px; }
      .full-bleed main {
        max-width: none;
        margin: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
        border-radius: 0;
      }
      h2 { margin-top: 0; }
      .control-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
      .control-row label { display: flex; flex-direction: column; font-size: 0.9rem; font-weight: 600; color: #333; }
      .control-row select,
      .control-row input { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; min-width: 150px; font-size: 0.95rem; }
      .plot { margin-bottom: 1.5rem; }
      ul { padding-left: 1.2rem; }
      table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
      th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
      th { background: #f0f0f0; }
      .message { padding: 1rem; background: #fff7e6; border: 1px solid #f0c36d; border-radius: 4px; margin-bottom: 1.5rem; }
      button { padding: 0.6rem 1.2rem; border: none; background: #0050ef; color: #fff; font-weight: 600; border-radius: 4px; cursor: pointer; }
      button:hover { background: #003cb8; }

      .workspace-shell {
        position: relative;
        min-height: calc(100vh - 120px);
        background: #070b13;
      }
      .workspace-controls {
        position: absolute;
        z-index: 20;
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(8, 14, 24, 0.76);
        backdrop-filter: blur(4px);
      }
      .workspace-controls .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        min-width: 130px;
      }
      .workspace-controls .control-group.compact { min-width: 86px; max-width: 100px; }
      .workspace-controls label { font-size: 0.75rem; color: #d9deea; font-weight: 600; letter-spacing: 0.02em; }
      .workspace-controls select,
      .workspace-controls input {
        background: rgba(21, 30, 44, 0.95);
        border: 1px solid #30405a;
        color: #eef2f9;
        border-radius: 6px;
        padding: 0.38rem 0.48rem;
      }
      .map-stage { position: relative; width: 100%; height: calc(100vh - 120px); }
      .workspace-map { width: 100%; height: 100%; }
      .mode-switch { display: flex; align-items: center; gap: 4px; }
      .mode-btn, .arrow-btn {
        background: rgba(29, 43, 63, 0.96);
        border: 1px solid #3b4c68;
        color: #e7ebf3;
        border-radius: 7px;
        padding: 0.4rem 0.55rem;
      }
      .mode-btn.active { background: #2f8cff; border-color: #2f8cff; color: #fff; }
      .overlay-panel {
        position: absolute;
        right: 14px;
        top: 86px;
        width: 300px;
        max-height: calc(100vh - 220px);
        overflow: auto;
        border-radius: 10px;
        background: rgba(8, 14, 24, 0.78);
        color: #e7ebf3;
        border: 1px solid #2f405c;
        padding: 12px;
        z-index: 20;
      }
      .overlay-panel h3 { margin: 0 0 6px 0; font-size: 1rem; }
      .overlay-time { margin: 0 0 8px 0; color: #b9c4d9; font-size: 0.83rem; }
      .overlay-panel ul { margin: 0; padding-left: 1rem; }
      .overlay-panel li { margin-bottom: 0.25rem; }
      .info-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        margin-left: 4px;
        font-size: 10px;
        background: #29486f;
        color: #fff;
        cursor: pointer;
      }
      .help-popover {
        position: absolute;
        z-index: 30;
        max-width: 260px;
        border: 1px solid #3c4f70;
        border-radius: 8px;
        background: rgba(6, 10, 18, 0.95);
        color: #ecf1f9;
        padding: 8px 10px;
        font-size: 0.8rem;
        line-height: 1.3;
      }
      .floating-message {
        position: absolute;
        bottom: 14px;
        left: 14px;
        z-index: 30;
      }
    </style>
  </head>
  <body class="{% if full_bleed %}dark-shell full-bleed{% endif %}">
    <header>
      <h1>Chicago AQI Sensor Network</h1>
      <nav>
        {% for label, endpoint in nav_links %}
          <a href="{{ url_for(endpoint) }}">{{ label }}</a>
        {% endfor %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
